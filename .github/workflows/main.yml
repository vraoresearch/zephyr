name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

# Added this global environment variable to silence the Node 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with Upstream
        uses: tgymnich/fork-sync@v2.0
        with:
          owner: zephyrproject-rtos
          repo: zephyr
          base: main
          head: main
          token: ${{ secrets.GITHUB_TOKEN }}
